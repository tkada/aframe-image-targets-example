<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>A-Frame: Image Targets Example</title>
  <script crossorigin="anonymous" src="../external/scripts/8frame-1.5.0.min.js"></script>
  <script crossorigin="anonymous" src="../external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="../external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="../external/xr/xr.js" async="true" data-preload-chunks="slam"></script>
  <script src="bundle.js"></script>


  <!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
  <meta name="8thwall:renderer" content="aframe:1.5.0" />
  <meta name="8thwall:package" content="@8thwall.xrextras" />
  <meta name="8thwall:package" content="@8thwall.landing-page" />
</head>

<body>

  <a-scene xrextras-gesture-detector landing-page xrextras-loading xrextras-runtime-error
    renderer="colorManagement:true" xrweb="disableWorldTracking: true">

    <a-assets>
      <!-- Credit to Poly by Google for the model: https://poly.google.com/view/dA5osnS0Rzj -->
      <a-asset-item id="jelly-glb" src="assets/jellyfish-model.glb"></a-asset-item>
      <img id="jelly-thumb" src="targets/video-target.jpg">
      <video id="jelly-video" autoplay muted crossorigin="anonymous" loop="true" src="assets/jellyfish-video.mp4">
      </video>
    </a-assets>

    <a-camera position="0 4 10" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

    <a-light type="ambient" intensity="1"></a-light>

    <!-- Note: "name:" must be set to the name of the image target -->
    <xrextras-named-image-target name="video-target">
      <a-entity xrextras-play-video="video: #jelly-video; thumb: #jelly-thumb; canstop: true"
        geometry="primitive: plane; height: 1; width: 0.79;"></a-entity>
    </xrextras-named-image-target>

    <!-- Note: "name:" must be set to the name of the image target  -->
    <xrextras-named-image-target name="model-target">
      <!-- Add a child entity that can be rotated independently of the image target. -->
      <a-entity xrextras-one-finger-rotate gltf-model="#jelly-glb"></a-entity>
    </xrextras-named-image-target>

  </a-scene>

</body>

</html>
